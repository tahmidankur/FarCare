<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FarCare — History</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <header class="page-header page">
    <div class="title-block">
      <h1>History</h1>
      <div class="subtitle" id="hist-count">—</div>
    </div>
    <div class="header-action" id="clear-btn-wrap" style="display:none">
      <button class="btn btn-danger btn-sm" onclick="openClearSheet()">Clear All</button>
    </div>
  </header>

  <!-- Stats row -->
  <div id="stats-row" class="card flex-between gap-12" style="display:none; flex-direction:row; padding:16px 18px;">
    <div style="text-align:center; flex:1">
      <div style="font-size:24px; font-weight:900; color:var(--primary)" id="stat-total">0</div>
      <div class="text-muted" style="margin-top:2px">Total</div>
    </div>
    <div style="width:1.5px; background:var(--border); align-self:stretch"></div>
    <div style="text-align:center; flex:1">
      <div style="font-size:24px; font-weight:900; color:var(--warm)" id="stat-streak">0</div>
      <div class="text-muted" style="margin-top:2px">Day streak 🔥</div>
    </div>
    <div style="width:1.5px; background:var(--border); align-self:stretch"></div>
    <div style="text-align:center; flex:1">
      <div style="font-size:24px; font-weight:900; color:var(--safe)" id="stat-contacts">0</div>
      <div class="text-muted" style="margin-top:2px">People</div>
    </div>
  </div>

  <div id="history-list"></div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></span><span class="nav-label">Home</span></a>
    <a href="contacts.html" class="nav-item"><span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span><span class="nav-label">Contacts</span></a>
    <a href="history.html" class="nav-item"><span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span><span class="nav-label">History</span></a>
    <a href="settings.html" class="nav-item"><span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span><span class="nav-label">Settings</span></a>
  </nav>
</div>

<!-- Clear confirm sheet -->
<div id="clear-sheet-overlay" class="sheet-overlay" style="display:none">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="text-align:center; padding:8px 0 22px">
      <div style="font-size:44px; margin-bottom:10px">🗑️</div>
      <h2>Clear all history?</h2>
      <p style="font-size:14px;color:var(--text-2);margin-top:6px;line-height:1.5">
        This removes all check-in records permanently.<br>Your contacts and templates are kept.
      </p>
    </div>
    <button class="btn btn-danger btn-full" onclick="clearHistory()">Yes, Clear History</button>
    <button class="btn btn-soft btn-full mt-8" onclick="closeSheet('clear-sheet-overlay')">Cancel</button>
  </div>
</div>

<script src="storage.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
  initNav();
  renderHistory();
});

function renderHistory() {
  const history = Storage.getHistory();
  const listEl  = document.getElementById('history-list');

  document.getElementById('hist-count').textContent =
    history.length ? history.length + ' check-in' + (history.length !== 1 ? 's' : '') : 'No check-ins yet';

  if (!history.length) {
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="es-icon">📋</div>
        <h3>No history yet</h3>
        <p>Every check-in you send will appear here. Go tap that blue button!</p>
        <a href="index.html" class="btn btn-primary">Go to Dashboard</a>
      </div>`;
    return;
  }

  // stats row
  document.getElementById('stats-row').style.display = 'flex';
  document.getElementById('clear-btn-wrap').style.display = '';
  document.getElementById('stat-total').textContent    = history.length;
  document.getElementById('stat-streak').textContent   = Storage.getStreak();
  const uniqueContacts = new Set(history.map(h => h.contactId || h.contactName)).size;
  document.getElementById('stat-contacts').textContent = uniqueContacts;

  // group by date
  const groups = {};
  history.forEach(h => {
    const key = new Date(h.timestamp).toDateString();
    if (!groups[key]) groups[key] = [];
    groups[key].push(h);
  });

  const todayStr     = new Date().toDateString();
  const yesterdayStr = new Date(Date.now() - 86400000).toDateString();

  listEl.innerHTML = Object.entries(groups).map(([dateStr, items]) => {
    const label = dateStr === todayStr ? 'Today' :
                  dateStr === yesterdayStr ? 'Yesterday' :
                  new Date(dateStr).toLocaleDateString('en-CA', { weekday:'long', month:'long', day:'numeric' });
    const rows = items.map(h => `
      <div class="history-item">
        <div class="avatar avatar-md ${avatarColor(h.contactName)}">${initials(h.contactName)}</div>
        <div class="hi-body">
          <div class="hi-meta">
            <span class="hi-name">${h.contactName}</span>
            <span class="hi-method">${h.method === 'whatsapp' ? '💬' : '✉️'} ${h.method}</span>
            <span class="hi-time">${timeAgo(h.timestamp)}</span>
          </div>
          <div class="hi-msg">${h.message}</div>
        </div>
      </div>`).join('');
    return `<div class="history-date-group"><div class="history-date-label">${label}</div>${rows}</div>`;
  }).join('');
}

function openClearSheet() { openSheet('clear-sheet-overlay'); }

function clearHistory() {
  Storage.clearHistory();
  closeSheet('clear-sheet-overlay');
  showToast('History cleared', 'default');
  renderHistory();
}

document.addEventListener('click', e => {
  if (e.target === document.getElementById('clear-sheet-overlay')) closeSheet('clear-sheet-overlay');
});
</script>
</body>
</html>
